name: "Docker Login"
description: "Log in to GHCR and optionally Docker Hub"

inputs:
  ghcr-token:
    description: "GitHub token for GHCR login"
    required: true
  dockerhub-username:
    description: "Docker Hub username (if omitted, Docker Hub login is skipped)"
    required: false
    default: ""
  dockerhub-token:
    description: "Docker Hub token"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Log in to GHCR
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.ghcr-token }}

    - name: Log in to Docker Hub
      if: inputs.dockerhub-username != '' && inputs.dockerhub-token != ''
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
      with:
        username: ${{ inputs.dockerhub-username }}
        password: ${{ inputs.dockerhub-token }}
