name: "Setup Foundry"
description: "Install Foundry toolchain (forge, cast, anvil, chisel)"

inputs:
  version:
    description: "Foundry toolchain version"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Install Foundry
      uses: foundry-rs/foundry-toolchain@c7450ba673e133f5ee30098b3b54f444d3a2ca2d # v1.8.0
      with:
        version: ${{ inputs.version }}

    - name: Show Forge version
      shell: bash
      run: forge --version
