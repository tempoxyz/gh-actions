name: "Label PR"
description: "Copy eligible labels from a linked issue to a pull request"

runs:
  using: "composite"
  steps:
    - name: Label PR
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      with:
        script: |
          const label_pr = require(`${process.env.GITHUB_ACTION_PATH}/label_pr.js`)
          await label_pr({github, context})
