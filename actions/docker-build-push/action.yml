name: "Docker Build & Push"
description: "Build and push a Docker image to a container registry"

inputs:
  context:
    description: "Docker build context"
    required: true
  file:
    description: "Dockerfile path (relative to context)"
    required: false
    default: ""
  image:
    description: "Full image name (e.g. ghcr.io/tempoxyz/myapp)"
    required: true
  tags:
    description: "Additional tags (newline-separated). sha-<short> is added automatically."
    required: false
    default: ""
  include-sha-tag:
    description: "Add image:sha-<short> to the tag list"
    required: false
    default: "true"
  labels:
    description: "Image labels (newline-separated)"
    required: false
    default: ""
  platforms:
    description: "Target platforms (e.g. linux/amd64,linux/arm64)"
    required: false
    default: "linux/amd64"
  push:
    description: "Push the image"
    required: false
    default: "true"
  build-args:
    description: "Build arguments (newline-separated KEY=VALUE)"
    required: false
    default: ""
  target:
    description: "Docker build target"
    required: false
    default: ""
  cache-from:
    description: "Cache sources"
    required: false
    default: ""
  cache-to:
    description: "Cache destinations"
    required: false
    default: ""
  provenance:
    description: "Generate provenance attestations"
    required: false
    default: "true"

outputs:
  short-sha:
    description: "7-char short SHA of the commit"
    value: ${{ steps.shortsha.outputs.shortsha }}
  digest:
    description: "Image digest"
    value: ${{ steps.build.outputs.digest }}

runs:
  using: "composite"
  steps:
    - name: Compute short SHA
      id: shortsha
      shell: bash
      run: echo "shortsha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

    - name: Compose tags
      id: tags
      shell: bash
      env:
        IMAGE: ${{ inputs.image }}
        INCLUDE_SHA_TAG: ${{ inputs.include-sha-tag }}
        INPUT_TAGS: ${{ inputs.tags }}
        SHORT_SHA: ${{ steps.shortsha.outputs.shortsha }}
      run: |
        {
          echo "tags<<EOF"
          if [ "$INCLUDE_SHA_TAG" = "true" ]; then
            echo "${IMAGE}:sha-${SHORT_SHA}"
          fi
          if [ -n "$INPUT_TAGS" ]; then
            echo "$INPUT_TAGS"
          fi
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

    - name: Build and push
      id: build
      uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.file }}
        push: ${{ inputs.push }}
        platforms: ${{ inputs.platforms }}
        tags: ${{ steps.tags.outputs.tags }}
        labels: ${{ inputs.labels }}
        build-args: ${{ inputs.build-args }}
        target: ${{ inputs.target }}
        cache-from: ${{ inputs.cache-from }}
        cache-to: ${{ inputs.cache-to }}
        provenance: ${{ inputs.provenance }}
