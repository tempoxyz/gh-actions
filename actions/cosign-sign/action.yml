name: "Cosign Sign"
description: "Install cosign and sign container images"

inputs:
  images:
    description: "Newline-separated list of image references to sign"
    required: true
  cosign-version:
    description: "Cosign version to install (leave empty for default)"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Install cosign
      uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      with:
        cosign-release: ${{ inputs.cosign-version }}

    - name: Sign images
      shell: bash
      env:
        IMAGES: ${{ inputs.images }}
      run: |
        set -euo pipefail
        echo "$IMAGES" | while IFS= read -r image; do
          [ -z "$image" ] && continue
          echo "Signing: $image"
          cosign sign --yes --recursive "$image"
        done
