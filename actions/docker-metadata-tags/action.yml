name: "Docker Metadata Tags"
description: "Generate Docker metadata with standard Tempo tagging strategy"

inputs:
  images:
    description: "Newline-separated list of image names"
    required: true
  bake-target:
    description: "Docker Bake target name (leave empty if not using bake)"
    required: false
    default: ""
  nightly:
    description: "Enable nightly tag"
    required: false
    default: "false"
  include-sha:
    description: "Include sha-<short> tag"
    required: false
    default: "true"
  include-latest:
    description: "Include latest tag on default branch"
    required: false
    default: "true"
  include-pr:
    description: "Include PR tag"
    required: false
    default: "true"

outputs:
  tags:
    description: "Generated tags"
    value: ${{ steps.meta.outputs.tags }}
  labels:
    description: "Generated labels"
    value: ${{ steps.meta.outputs.labels }}
  bake-file:
    description: "Bake file path (if bake-target set)"
    value: ${{ steps.meta.outputs.bake-file }}

runs:
  using: "composite"
  steps:
    - name: Docker metadata
      id: meta
      uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
      with:
        images: ${{ inputs.images }}
        bake-target: ${{ inputs.bake-target }}
        tags: |
          type=schedule,pattern=nightly
          type=raw,value=nightly,enable=${{ inputs.nightly == 'true' }}
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=raw,value=stable,enable=${{ github.ref_type == 'tag' }}
          type=raw,value=latest,enable=${{ inputs.include-latest == 'true' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
          type=edge,branch=${{ github.event.repository.default_branch }}
          type=sha,prefix=sha-,enable=${{ inputs.include-sha == 'true' }}
          type=ref,event=pr,enable=${{ inputs.include-pr == 'true' }}
