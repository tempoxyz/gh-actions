name: "Setup Rust Build"
description: "Install Rust toolchain, mold linker, and sccache"

inputs:
  toolchain:
    description: "Rust toolchain (stable, nightly, or specific version)"
    required: false
    default: "stable"
  components:
    description: "Comma-separated Rust components (e.g., clippy,rustfmt)"
    required: false
    default: ""
  targets:
    description: "Comma-separated Rust targets"
    required: false
    default: ""
  mold:
    description: "Install mold linker"
    required: false
    default: "true"
  sccache:
    description: "Enable sccache"
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
      with:
        toolchain: ${{ inputs.toolchain }}
        components: ${{ inputs.components }}
        targets: ${{ inputs.targets }}

    - name: Install mold linker
      if: inputs.mold == 'true'
      uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444 # v1

    - name: Enable sccache
      if: inputs.sccache == 'true'
      uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9
