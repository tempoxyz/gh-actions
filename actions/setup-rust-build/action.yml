name: "Setup Rust Build"
description: "Install Rust toolchain, mold linker, and sccache"

inputs:
  toolchain:
    description: "Rust toolchain (stable, nightly, or specific version)"
    required: false
    default: "stable"
  components:
    description: "Comma-separated Rust components (e.g., clippy,rustfmt)"
    required: false
    default: ""
  targets:
    description: "Comma-separated Rust targets"
    required: false
    default: ""
  mold:
    description: "Install mold linker"
    required: false
    default: "true"
  sccache:
    description: "Enable sccache"
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Install Rust toolchain
      shell: bash
      env:
        RUST_TOOLCHAIN: ${{ inputs.toolchain }}
        RUST_COMPONENTS: ${{ inputs.components }}
        RUST_TARGETS: ${{ inputs.targets }}
      run: |
        args=("$RUST_TOOLCHAIN" "--profile" "minimal")
        if [ -n "$RUST_COMPONENTS" ]; then
          IFS=',' read -ra components <<< "$RUST_COMPONENTS"
          for component in "${components[@]}"; do
            component="${component#"${component%%[![:space:]]*}"}"
            component="${component%"${component##*[![:space:]]}"}"
            [ -n "$component" ] && args+=("--component" "$component")
          done
        fi
        if [ -n "$RUST_TARGETS" ]; then
          IFS=',' read -ra targets <<< "$RUST_TARGETS"
          for target in "${targets[@]}"; do
            target="${target#"${target%%[![:space:]]*}"}"
            target="${target%"${target##*[![:space:]]}"}"
            [ -n "$target" ] && args+=("--target" "$target")
          done
        fi
        rustup toolchain install "${args[@]}"
        rustup default "$RUST_TOOLCHAIN"

    - name: Install mold linker
      if: inputs.mold == 'true'
      uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444 # v1

    - name: Enable sccache
      if: inputs.sccache == 'true'
      uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
