name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

jobs:
  scan-github-actions:
    name: Scan GitHub Actions
    uses: ./.github/workflows/scan-github-actions.yml
    permissions:
      actions: read
      contents: read
    with:
      # This repo authors composite actions under actions/, so widen the default
      # `.github/` scope to also scan them.
      paths: ".github actions"
