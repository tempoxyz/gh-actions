name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

jobs:
  scan-github-actions:
    name: Scan GitHub Actions
    uses: ./.github/workflows/scan-github-actions.yml
    permissions:
      actions: read
      contents: read

  check-action-pins:
    name: Check GitHub Actions pins
    uses: ./.github/workflows/check-action-pins.yml
    permissions:
      contents: read
