name: Pull request audit

on:
  workflow_call:
    inputs:
      required-label:
        description: Label required to trigger audit event publishing. Kept for compatibility; use required-labels for multiple labels.
        required: false
        type: string
        default: cyclops
      required-labels:
        description: Comma or newline-separated labels that trigger audit event publishing.
        required: false
        type: string
      branch:
        description: Branch to audit when called from workflow_dispatch.
        required: false
        type: string
      pr-number:
        description: PR number to audit when called from workflow_dispatch.
        required: false
        type: number
      environment:
        description: GitHub Environment name used to gate audit publishing.
        required: false
        type: string
    secrets:
      EVENTS_KEY:
        required: true
      EVENTS_CERT:
        required: true
      EVENTS_ARGS:
        required: true

permissions: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
    steps:
      - name: Resolve target
        id: target
        env:
          ACTOR: ${{ github.actor }}
          REQUIRED_LABEL: ${{ inputs.required-label }}
          REQUIRED_LABELS: ${{ inputs.required-labels }}
          BRANCH: ${{ inputs.branch }}
          EVENT_ACTION: ${{ github.event.action }}
          EVENT_NAME: ${{ github.event_name }}
          GH_TOKEN: ${{ github.token }}
          LABEL_NAME: ${{ github.event.label.name }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          TARGET_PR_NUMBER: ${{ inputs.pr-number }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            labels="${REQUIRED_LABELS:-$REQUIRED_LABEL}"
            if [[ "$EVENT_ACTION" != "labeled" ]]; then
              echo "publish=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            matched=false
            while IFS= read -r label; do
              label="${label#"${label%%[![:space:]]*}"}"
              label="${label%"${label##*[![:space:]]}"}"
              if [[ -n "$label" && "$LABEL_NAME" == "$label" ]]; then
                matched=true
                break
              fi
            done < <(printf '%s\n' "$labels" | tr ',' '\n')

            if [[ "$matched" != "true" ]]; then
              echo "publish=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
            echo "sha=$PR_HEAD_SHA" >> "$GITHUB_OUTPUT"

          elif [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            PERM=$(gh api "repos/$REPO/collaborators/$ACTOR/permission" --jq '.permission')
            if [[ "$PERM" != "admin" ]]; then
              echo "::error::Only admins can trigger ad-hoc audits (got: $PERM)"
              exit 1
            fi

            if [[ -n "$TARGET_PR_NUMBER" && "$TARGET_PR_NUMBER" != "0" ]]; then
              SHA=$(gh api "repos/$REPO/pulls/$TARGET_PR_NUMBER" --jq '.head.sha')
              echo "pr_number=$TARGET_PR_NUMBER" >> "$GITHUB_OUTPUT"
              echo "sha=$SHA" >> "$GITHUB_OUTPUT"
            elif [[ -n "$BRANCH" ]]; then
              SHA=$(gh api "repos/$REPO/commits/$BRANCH" --jq '.sha')
              echo "sha=$SHA" >> "$GITHUB_OUTPUT"
            else
              echo "::error::Either branch or pr-number must be provided"
              exit 1
            fi
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "publish=true" >> "$GITHUB_OUTPUT"

      - name: Publish event
        if: steps.target.outputs.publish == 'true'
        env:
          EVENTS_KEY: ${{ secrets.EVENTS_KEY }}
          EVENTS_CERT: ${{ secrets.EVENTS_CERT }}
          EVENTS_ARGS: ${{ secrets.EVENTS_ARGS }}
          REPO: ${{ github.repository }}
          TARGET_PR_NUMBER: ${{ steps.target.outputs.pr_number }}
          TARGET_SHA: ${{ steps.target.outputs.sha }}
        run: |
          set -euo pipefail

          printf '%s' "$EVENTS_KEY" > "$RUNNER_TEMP/key"
          printf '%s' "$EVENTS_CERT" > "$RUNNER_TEMP/cert"

          events_args=()
          while IFS= read -r -d '' arg; do
            events_args+=("$arg")
          done < <(
            env -i PATH="$PATH" python3 -I -S -c '
          import shlex
          import sys

          for arg in shlex.split(sys.stdin.read()):
              sys.stdout.buffer.write(arg.encode() + b"\0")
          ' <<< "$EVENTS_ARGS"
          )
          if (( ${#events_args[@]} == 0 )); then
            echo "::error::EVENTS_ARGS must contain at least one curl argument"
            exit 1
          fi

          child_env=(PATH="$PATH")
          for name in \
            HTTP_PROXY HTTPS_PROXY NO_PROXY ALL_PROXY \
            http_proxy https_proxy no_proxy all_proxy \
            SSL_CERT_FILE SSL_CERT_DIR CURL_CA_BUNDLE
          do
            if [[ -v "$name" ]]; then
              child_env+=("$name=${!name}")
            fi
          done

          env -i PATH="$PATH" jq -n \
            --arg repo "$REPO" \
            --arg sha "$TARGET_SHA" \
            --arg pr "$TARGET_PR_NUMBER" \
            '{
              repository: $repo,
              event: "pr_audit",
              data: (
                {sha: $sha}
                + (if $pr != "" then {pr_number: ($pr | tonumber)} else {} end)
              )
            }' \
          | env -i "${child_env[@]}" curl -sf -o /dev/null -X POST "${events_args[@]}" \
              -H "Content-Type: application/json" \
              --key "$RUNNER_TEMP/key" \
              --cert "$RUNNER_TEMP/cert" \
              -d @-
