name: Pull request audit

on:
  workflow_call:
    inputs:
      required-label:
        description: Label required to trigger audit event publishing.
        required: false
        type: string
        default: cyclops
      branch:
        description: Branch to audit (for manual workflow_dispatch runs).
        required: false
        type: string
    secrets:
      EVENTS_KEY:
        required: true
      EVENTS_CERT:
        required: true
      EVENTS_ARGS:
        required: true

jobs:
  publish-pr:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'labeled' && github.event.label.name == inputs.required-label
    steps:
      - name: Publish event
        run: |
          set -euo pipefail

          echo "${{ secrets.EVENTS_KEY }}" > "${{ runner.temp }}/key"
          echo "${{ secrets.EVENTS_CERT }}" > "${{ runner.temp }}/cert"

          # EVENTS_ARGS may contain additional curl arguments, not just a URL.
          curl -sf -o /dev/null -X POST ${{ secrets.EVENTS_ARGS }} \
            -H "Content-Type: application/json" \
            --key "${{ runner.temp }}/key" \
            --cert "${{ runner.temp }}/cert" \
            -d '{
              "repository": "${{ github.repository }}",
              "event": "pr_audit",
              "data": {
                "pr_number": ${{ github.event.pull_request.number }},
                "sha": "${{ github.event.pull_request.head.sha }}"
              }
            }'

  publish-branch:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.branch != ''
    steps:
      - name: Resolve branch SHA
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA=$(gh api repos/${{ github.repository }}/commits/${{ inputs.branch }} --jq '.sha')
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Publish event
        run: |
          set -euo pipefail

          echo "${{ secrets.EVENTS_KEY }}" > "${{ runner.temp }}/key"
          echo "${{ secrets.EVENTS_CERT }}" > "${{ runner.temp }}/cert"

          curl -sf -o /dev/null -X POST ${{ secrets.EVENTS_ARGS }} \
            -H "Content-Type: application/json" \
            --key "${{ runner.temp }}/key" \
            --cert "${{ runner.temp }}/cert" \
            -d '{
              "repository": "${{ github.repository }}",
              "event": "pr_audit",
              "data": {
                "sha": "${{ steps.resolve.outputs.sha }}"
              }
            }'
