name: Pull request audit

on:
  workflow_call:
    inputs:
      required-label:
        description: Label required to trigger audit event publishing.
        required: false
        type: string
        default: cyclops
      branch:
        description: Branch to audit (for manual workflow_dispatch runs).
        required: false
        type: string
      pr-number:
        description: PR number to audit (for manual workflow_dispatch runs).
        required: false
        type: number
    secrets:
      EVENTS_KEY:
        required: true
      EVENTS_CERT:
        required: true
      EVENTS_ARGS:
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve target
        id: target
        env:
          ACTOR: ${{ github.actor }}
          BRANCH: ${{ inputs.branch }}
          EVENT_ACTION: ${{ github.event.action }}
          EVENT_NAME: ${{ github.event_name }}
          GH_TOKEN: ${{ github.token }}
          LABEL_NAME: ${{ github.event.label.name }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          REQUIRED_LABEL: ${{ inputs.required-label }}
          TARGET_PR_NUMBER: ${{ inputs.pr-number }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            if [[ "$EVENT_ACTION" != "labeled" || "$LABEL_NAME" != "$REQUIRED_LABEL" ]]; then
              echo "publish=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
            echo "sha=$PR_HEAD_SHA" >> "$GITHUB_OUTPUT"

          elif [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            PERM=$(gh api "repos/$REPO/collaborators/$ACTOR/permission" --jq '.permission')
            if [[ "$PERM" != "admin" ]]; then
              echo "::error::Only admins can trigger ad-hoc audits (got: $PERM)"
              exit 1
            fi

            if [[ -n "$TARGET_PR_NUMBER" && "$TARGET_PR_NUMBER" != "0" ]]; then
              SHA=$(gh api "repos/$REPO/pulls/$TARGET_PR_NUMBER" --jq '.head.sha')
              echo "pr_number=$TARGET_PR_NUMBER" >> "$GITHUB_OUTPUT"
              echo "sha=$SHA" >> "$GITHUB_OUTPUT"
            elif [[ -n "$BRANCH" ]]; then
              SHA=$(gh api "repos/$REPO/commits/$BRANCH" --jq '.sha')
              echo "sha=$SHA" >> "$GITHUB_OUTPUT"
            else
              echo "::error::Either branch or pr-number must be provided"
              exit 1
            fi
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "publish=true" >> "$GITHUB_OUTPUT"

      - name: Publish event
        if: steps.target.outputs.publish == 'true'
        env:
          REPO: ${{ github.repository }}
          TARGET_PR_NUMBER: ${{ steps.target.outputs.pr_number }}
          TARGET_SHA: ${{ steps.target.outputs.sha }}
        run: |
          set -euo pipefail

          printf '%s' '${{ secrets.EVENTS_KEY }}' > "$RUNNER_TEMP/key"
          printf '%s' '${{ secrets.EVENTS_CERT }}' > "$RUNNER_TEMP/cert"

          jq -n \
            --arg repo "$REPO" \
            --arg sha "$TARGET_SHA" \
            --arg pr "$TARGET_PR_NUMBER" \
            '{
              repository: $repo,
              event: "pr_audit",
              data: (
                {sha: $sha}
                + (if $pr != "" then {pr_number: ($pr | tonumber)} else {} end)
              )
            }' \
          | curl -sf -o /dev/null -X POST ${{ secrets.EVENTS_ARGS }} \
              -H "Content-Type: application/json" \
              --key "$RUNNER_TEMP/key" \
              --cert "$RUNNER_TEMP/cert" \
              -d @-
