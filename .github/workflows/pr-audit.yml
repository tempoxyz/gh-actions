name: Pull request audit

on:
  workflow_call:
    inputs:
      audit-labels:
        description: Newline-separated labels that trigger audit event publishing from pull_request labeled events.
        required: false
        type: string
        default: |
          cyclops
          agentic-audit
      branch:
        description: Branch to audit when called from workflow_dispatch.
        required: false
        type: string
      pr-number:
        description: PR number to audit when called from workflow_dispatch.
        required: false
        type: number
      enable-comment-commands:
        description: Whether issue_comment audit commands are handled.
        required: false
        type: boolean
        default: true
      comment-command-regex:
        description: JavaScript regex source that matches allowed audit comment commands.
        required: false
        type: string
        default: '^(?:@decofe\s+)?(?:cyclops\s+audit|derek\s+audit)\b'
      permission-check-mode:
        description: Use author_association checks or org membership API checks for comment commands.
        required: false
        type: string
        default: association
      organization:
        description: Organization used when permission-check-mode is org.
        required: false
        type: string
        default: tempoxyz
      environment:
        description: GitHub Environment name used to gate audit publishing jobs.
        required: false
        type: string
    secrets:
      EVENTS_KEY:
        required: true
      EVENTS_CERT:
        required: true
      EVENTS_ARGS:
        required: true
      DEREK_BENCH_TOKEN:
        required: false

permissions: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
    steps:
      - name: Resolve target
        id: target
        env:
          ACTOR: ${{ github.actor }}
          AUDIT_LABELS: ${{ inputs.audit-labels }}
          BRANCH: ${{ inputs.branch }}
          EVENT_ACTION: ${{ github.event.action }}
          EVENT_NAME: ${{ github.event_name }}
          GH_TOKEN: ${{ github.token }}
          LABEL_NAME: ${{ github.event.label.name }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          TARGET_PR_NUMBER: ${{ inputs.pr-number }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            if [[ "$EVENT_ACTION" != "labeled" ]]; then
              echo "publish=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            matched=false
            while IFS= read -r label; do
              [[ -n "$label" ]] || continue
              if [[ "$LABEL_NAME" == "$label" ]]; then
                matched=true
                break
              fi
            done <<< "$AUDIT_LABELS"

            if [[ "$matched" != "true" ]]; then
              echo "publish=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
            echo "sha=$PR_HEAD_SHA" >> "$GITHUB_OUTPUT"

          elif [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            PERM=$(gh api "repos/$REPO/collaborators/$ACTOR/permission" --jq '.permission')
            if [[ "$PERM" != "admin" ]]; then
              echo "::error::Only admins can trigger ad-hoc audits (got: $PERM)"
              exit 1
            fi

            if [[ -n "$TARGET_PR_NUMBER" && "$TARGET_PR_NUMBER" != "0" ]]; then
              SHA=$(gh api "repos/$REPO/pulls/$TARGET_PR_NUMBER" --jq '.head.sha')
              echo "pr_number=$TARGET_PR_NUMBER" >> "$GITHUB_OUTPUT"
              echo "sha=$SHA" >> "$GITHUB_OUTPUT"
            elif [[ -n "$BRANCH" ]]; then
              SHA=$(gh api "repos/$REPO/commits/$BRANCH" --jq '.sha')
              echo "sha=$SHA" >> "$GITHUB_OUTPUT"
            else
              echo "::error::Either branch or pr-number must be provided"
              exit 1
            fi
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "publish=true" >> "$GITHUB_OUTPUT"

      - name: Publish event
        if: steps.target.outputs.publish == 'true'
        env:
          EVENTS_KEY: ${{ secrets.EVENTS_KEY }}
          EVENTS_CERT: ${{ secrets.EVENTS_CERT }}
          EVENTS_ARGS: ${{ secrets.EVENTS_ARGS }}
          REPO: ${{ github.repository }}
          TARGET_PR_NUMBER: ${{ steps.target.outputs.pr_number }}
          TARGET_SHA: ${{ steps.target.outputs.sha }}
        run: |
          set -euo pipefail

          printf '%s' "$EVENTS_KEY" > "$RUNNER_TEMP/key"
          printf '%s' "$EVENTS_CERT" > "$RUNNER_TEMP/cert"

          jq -n \
            --arg repo "$REPO" \
            --arg sha "$TARGET_SHA" \
            --arg pr "$TARGET_PR_NUMBER" \
            '{
              repository: $repo,
              event: "pr_audit",
              data: (
                {sha: $sha}
                + (if $pr != "" then {pr_number: ($pr | tonumber)} else {} end)
              )
            }' \
          | curl -sf -o /dev/null -X POST $EVENTS_ARGS \
              -H "Content-Type: application/json" \
              --key "$RUNNER_TEMP/key" \
              --cert "$RUNNER_TEMP/cert" \
              -d @-

  publish-comment:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    if: >-
      inputs.enable-comment-commands &&
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout shared actions
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: tempoxyz/gh-actions
          ref: ${{ github.job_workflow_sha }}
          path: .gh-actions
          persist-credentials: false

      - name: Handle audit command
        uses: ./.gh-actions/actions/pr-audit-comment
        with:
          command-regex: ${{ inputs.comment-command-regex }}
          permission-check-mode: ${{ inputs.permission-check-mode }}
          organization: ${{ inputs.organization }}
          events-key: ${{ secrets.EVENTS_KEY }}
          events-cert: ${{ secrets.EVENTS_CERT }}
          events-args: ${{ secrets.EVENTS_ARGS }}
          github-token: ${{ secrets.DEREK_BENCH_TOKEN || github.token }}
