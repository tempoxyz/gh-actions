name: Pull request audit

on:
  workflow_call:
    inputs:
      required-label:
        description: Label required to trigger audit event publishing.
        required: false
        type: string
        default: cyclops
      branch:
        description: Branch to audit (for manual workflow_dispatch runs).
        required: false
        type: string
      pr-number:
        description: PR number to audit (for manual workflow_dispatch runs).
        required: false
        type: number
    secrets:
      EVENTS_KEY:
        required: true
      EVENTS_CERT:
        required: true
      EVENTS_ARGS:
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve target
        id: target
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            if [[ "${{ github.event.action }}" != "labeled" || "${{ github.event.label.name }}" != "${{ inputs.required-label }}" ]]; then
              echo "publish=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "pr_number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "sha=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"

          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            PERM=$(gh api repos/${{ github.repository }}/collaborators/${{ github.actor }}/permission --jq '.permission')
            if [[ "$PERM" != "admin" ]]; then
              echo "::error::Only admins can trigger ad-hoc audits (got: $PERM)"
              exit 1
            fi

            if [[ -n "${{ inputs.pr-number }}" && "${{ inputs.pr-number }}" != "0" ]]; then
              SHA=$(gh api repos/${{ github.repository }}/pulls/${{ inputs.pr-number }} --jq '.head.sha')
              echo "pr_number=${{ inputs.pr-number }}" >> "$GITHUB_OUTPUT"
              echo "sha=$SHA" >> "$GITHUB_OUTPUT"
            elif [[ -n "${{ inputs.branch }}" ]]; then
              SHA=$(gh api repos/${{ github.repository }}/commits/${{ inputs.branch }} --jq '.sha')
              echo "sha=$SHA" >> "$GITHUB_OUTPUT"
            else
              echo "::error::Either branch or pr-number must be provided"
              exit 1
            fi
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "publish=true" >> "$GITHUB_OUTPUT"

      - name: Publish event
        if: steps.target.outputs.publish == 'true'
        run: |
          set -euo pipefail

          printf '%s' '${{ secrets.EVENTS_KEY }}' > "$RUNNER_TEMP/key"
          printf '%s' '${{ secrets.EVENTS_CERT }}' > "$RUNNER_TEMP/cert"

          jq -n \
            --arg repo "${{ github.repository }}" \
            --arg sha "${{ steps.target.outputs.sha }}" \
            --arg pr "${{ steps.target.outputs.pr_number }}" \
            '{
              repository: $repo,
              event: "pr_audit",
              data: (
                {sha: $sha}
                + (if $pr != "" then {pr_number: ($pr | tonumber)} else {} end)
              )
            }' \
          | curl -sf -o /dev/null -X POST ${{ secrets.EVENTS_ARGS }} \
              -H "Content-Type: application/json" \
              --key "$RUNNER_TEMP/key" \
              --cert "$RUNNER_TEMP/cert" \
              -d @-
