name: Test

# Integration tests for the scan-github-actions composite action. Distinct from
# ci.yml (which already dogfoods the reusable read-only path on this repo): this
# suite exercises the composite path with a clean fixture and a negative fixture.
# The SARIF upload path is intentionally not exercised here so this repo's code
# scanning stays clean.
#
# All checks run in a single job so the suite surfaces as one status check
# (`Test / integration`), which can be marked required in branch protection.

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

jobs:
  integration:
    name: integration
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # Guard: the reusable workflow should delegate to the local composite
      # action so scan/lint behavior has a single source of truth.
      - name: Assert reusable delegates to composite
        run: |
          set -euo pipefail
          if ! grep -q 'uses: ./actions/scan-github-actions' .github/workflows/scan-github-actions.yml; then
            echo "::error::reusable workflow must call ./actions/scan-github-actions"
            exit 1
          fi

      # Positive: composite on a staged known-good workflow must pass. Covers
      # composite wiring (zizmor + actionlint) and acts as the control for the
      # negative case below, which uses the same staging mechanism.
      - name: Stage clean fixture
        run: cp testdata/fixtures/clean.yml .github/workflows/zz-clean-fixture.yml
      - name: Run composite on clean fixture (expected to pass)
        uses: ./actions/scan-github-actions

      # Negative: swapping in a broken workflow must make the composite fail.
      - name: Swap clean fixture for broken fixture
        run: |
          rm -f .github/workflows/zz-clean-fixture.yml
          cp testdata/fixtures/broken.yml .github/workflows/zz-broken-fixture.yml
      - name: Run composite on broken fixture (expected to fail)
        id: scan
        continue-on-error: true
        uses: ./actions/scan-github-actions
      - name: Assert the scan failed
        env:
          OUTCOME: ${{ steps.scan.outcome }}
        run: |
          if [ "$OUTCOME" != "failure" ]; then
            echo "::error::composite should have failed on the broken fixture (outcome=$OUTCOME)"
            exit 1
          fi
          echo "composite correctly failed on the broken fixture"
