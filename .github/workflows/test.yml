name: Test

# Integration tests for the scan-github-actions composite action. Distinct from
# ci.yml (which already dogfoods the reusable read-only path on this repo): this
# suite exercises the composite path (untested by ci.yml) with a clean fixture
# and a negative fixture, plus reusable/composite pin parity. The SARIF upload
# path is intentionally not exercised here so this repo's code scanning stays
# clean.

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

jobs:
  # Positive: composite action on a staged known-good workflow must pass. Covers
  # composite wiring (zizmor + actionlint) and acts as the control for the
  # negative fixture below, which uses the same staging mechanism.
  composite-clean:
    name: composite (clean fixture)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Stage clean fixture
        run: cp testdata/fixtures/clean.yml .github/workflows/zz-clean-fixture.yml
      - name: Run composite (expected to pass)
        uses: ./actions/scan-github-actions

  # Negative: staging a broken workflow must make the composite fail.
  composite-negative:
    name: composite (negative fixture)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Stage broken fixture
        run: cp testdata/fixtures/broken.yml .github/workflows/zz-broken-fixture.yml
      - name: Run composite (expected to fail)
        id: scan
        continue-on-error: true
        uses: ./actions/scan-github-actions
      - name: Assert the scan failed
        env:
          OUTCOME: ${{ steps.scan.outcome }}
        run: |
          if [ "$OUTCOME" != "failure" ]; then
            echo "::error::composite should have failed on the broken fixture (outcome=$OUTCOME)"
            exit 1
          fi
          echo "composite correctly failed on the broken fixture"

  # Guard: the reusable workflow and composite action must pin identical tool
  # versions, since they duplicate the zizmor + actionlint steps.
  digest-parity:
    name: reusable/composite pin parity
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Assert pins match
        run: |
          set -euo pipefail
          reusable=.github/workflows/scan-github-actions.yml
          composite=actions/scan-github-actions/action.yml
          status=0
          for tool in 'zizmorcore/zizmor-action' 'docker://rhysd/actionlint'; do
            r=$(grep -oE "${tool}@[^ ]+" "$reusable" | sort -u || true)
            c=$(grep -oE "${tool}@[^ ]+" "$composite" | sort -u || true)
            if [ -z "$r" ] || [ -z "$c" ]; then
              echo "::error::missing pin for ${tool} (reusable='$r' composite='$c')"
              status=1
            elif [ "$r" != "$c" ]; then
              echo "::error::${tool} pin differs (reusable='$r' composite='$c')"
              status=1
            else
              echo "ok: ${tool} -> $r"
            fi
          done
          exit "$status"
