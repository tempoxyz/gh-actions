name: rust lint

on:
  workflow_call:
    inputs:
      clippy-runner:
        description: Runner used for cargo clippy.
        required: false
        type: string
        default: depot-ubuntu-latest-4
      fmt-runner:
        description: Runner used for cargo fmt.
        required: false
        type: string
        default: depot-ubuntu-latest
      typos-runner:
        description: Runner used for typos.
        required: false
        type: string
        default: depot-ubuntu-latest
      deny-runner:
        description: Runner used for cargo deny.
        required: false
        type: string
        default: ubuntu-latest
      timeout-minutes:
        description: Timeout for each lint job.
        required: false
        type: number
        default: 30
      checkout-submodules:
        description: Submodule checkout mode passed to actions/checkout.
        required: false
        type: string
        default: "false"
      rust-toolchain:
        description: Rust toolchain used for clippy and fmt.
        required: false
        type: string
        default: nightly
      clippy-flags:
        description: Flags passed to cargo clippy.
        required: false
        type: string
        default: --all-targets --all-features --locked
      fmt-flags:
        description: Flags passed to cargo fmt.
        required: false
        type: string
        default: --all --check
      deny-flags:
        description: Additional flags passed to cargo deny check all.
        required: false
        type: string
        default: --all-features

permissions: {}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full

jobs:
  clippy:
    name: clippy
    runs-on: ${{ inputs.clippy-runner }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    env:
      RUSTC_WRAPPER: sccache
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          submodules: ${{ inputs.checkout-submodules }}
      - name: Install Rust toolchain
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal --component clippy
          rustup default "$RUST_TOOLCHAIN"
        env:
          RUST_TOOLCHAIN: ${{ inputs.rust-toolchain }}
      - uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444 # v1
      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - name: Run clippy
        run: |
          # CLIPPY_FLAGS is a space-separated flag list that must word-split.
          # shellcheck disable=SC2086
          cargo clippy $CLIPPY_FLAGS
        env:
          CLIPPY_FLAGS: ${{ inputs.clippy-flags }}
          RUSTFLAGS: -D warnings

  fmt:
    name: fmt
    runs-on: ${{ inputs.fmt-runner }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal --component rustfmt
          rustup default "$RUST_TOOLCHAIN"
        env:
          RUST_TOOLCHAIN: ${{ inputs.rust-toolchain }}
      - name: Run fmt
        run: |
          # FMT_FLAGS is a space-separated flag list that must word-split.
          # shellcheck disable=SC2086
          cargo fmt $FMT_FLAGS
        env:
          FMT_FLAGS: ${{ inputs.fmt-flags }}

  typos:
    name: typos
    runs-on: ${{ inputs.typos-runner }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: crate-ci/typos@37bb98842b0d8c4ffebdb75301a13db0267cef89 # v1.47.2

  deny:
    name: cargo deny check
    runs-on: ${{ inputs.deny-runner }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2.0.20
        with:
          command: check all
          arguments: ${{ inputs.deny-flags }}

  lint-success:
    name: lint success
    runs-on: ubuntu-latest
    if: always()
    permissions: {}
    needs:
      - clippy
      - fmt
      - typos
      - deny
    timeout-minutes: ${{ inputs.timeout-minutes }}
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
