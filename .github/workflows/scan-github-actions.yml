name: Scan GitHub Actions

on:
  workflow_call:
    inputs:
      paths:
        description: "Whitespace-separated paths for zizmor to scan. Defaults to `.` (the whole repo), so first-party workflows and actions anywhere (e.g. across a monorepo) are covered. Narrow it (e.g. to `.github/`) to exclude vendored or third-party trees."
        required: false
        type: string
        default: "."
      config:
        description: "Path to a zizmor configuration file for overrides"
        required: false
        type: string
        default: ""
      actionlint:
        description: "Run actionlint for workflows and composite action linting in addition to the zizmor security scan."
        required: false
        type: boolean
        default: true

permissions: {}

jobs:
  # Delegates to the composite action so scan/lint behavior has one source of
  # truth. The reusable workflow remains read-only and never requests
  # `security-events: write`.
  # SARIF upload to code scanning is available via the composite action instead
  # (see actions/scan-github-actions), which runs in a job you control.
  scan-github-actions:
    name: Scan GitHub Actions
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Scan GitHub Actions
        uses: ./actions/scan-github-actions
        with:
          advanced-security: false
          actionlint: ${{ inputs.actionlint }}
          config: ${{ inputs.config }}
          paths: ${{ inputs.paths }}
