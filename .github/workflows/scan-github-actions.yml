name: Scan GitHub Actions

on:
  workflow_call:
    inputs:
      config:
        description: "Path to a zizmor configuration file for overrides"
        required: false
        type: string
        default: ""
      advanced-security:
        description: "Upload SARIF to GitHub code scanning. Requires Code Security/code scanning to be enabled for the repository."
        required: false
        type: boolean
        default: false

permissions: {}

jobs:
  scan-github-actions:
    name: Scan GitHub Actions
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Scan GitHub Actions
        uses: zizmorcore/zizmor-action@b1d7e1fb5de872772f31590499237e7cce841e8e # v0.5.3
        with:
          persona: regular
          online-audits: true
          advanced-security: ${{ inputs.advanced-security }}
          annotations: ${{ !inputs.advanced-security }}
          config: ${{ inputs.config }}
          token: ${{ github.token }}
