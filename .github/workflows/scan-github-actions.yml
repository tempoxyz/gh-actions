name: Scan GitHub Actions

on:
  workflow_call:
    inputs:
      paths:
        description: "Whitespace-separated paths for zizmor to scan. Defaults to `.github/`, which covers the repo's own workflows and `.github/actions` while excluding vendored/third-party trees. Set to `.` to scan the whole repo, or add first-party action directories (e.g. `.github actions`)."
        required: false
        type: string
        default: ".github/"
      config:
        description: "Path to a zizmor configuration file for overrides"
        required: false
        type: string
        default: ""
      actionlint:
        description: "Run actionlint (workflow syntax, expression, and shellcheck/pyflakes checks) in addition to the zizmor security scan."
        required: false
        type: boolean
        default: true

permissions: {}

jobs:
  # zizmor annotations + actionlint. Both are read-only, so this workflow never
  # requests `security-events: write` and callers only need read scopes.
  # SARIF upload to code scanning is available via the composite action instead
  # (see actions/scan-github-actions), which runs in a job you control.
  scan-github-actions:
    name: Scan GitHub Actions
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Scan GitHub Actions
        uses: zizmorcore/zizmor-action@b1d7e1fb5de872772f31590499237e7cce841e8e # v0.5.3
        with:
          inputs: ${{ inputs.paths }}
          persona: regular
          online-audits: true
          advanced-security: false
          annotations: true
          config: ${{ inputs.config }}
          token: ${{ github.token }}

      - name: Lint GitHub Actions
        if: ${{ !cancelled() && inputs.actionlint }}
        uses: docker://rhysd/actionlint@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667 # v1.7.12
        with:
          args: -color
